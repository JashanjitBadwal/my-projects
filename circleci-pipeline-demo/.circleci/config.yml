version: 2.1

orbs:
  # Computes a pipeline parameter from the diff against `main` so we can skip
  # build/test/publish entirely when no relevant files changed.
  path-filtering: circleci/path-filtering@1.1.0
  # Provides aws-cli/setup, which exchanges CircleCI's OIDC token for a
  # short-lived AWS role session — no static AWS keys needed.
  aws-cli: circleci/aws-cli@4.1.3

parameters:
  # Set to true by the path-filtering job below when app/test/infra files
  # changed. Both workflows in this file key off this parameter so that an
  # irrelevant commit (e.g. a README edit) triggers no build at all.
  run-build:
    type: boolean
    default: false

jobs:
  build-image:
    docker:
      - image: cimg/base:2024.06
    steps:
      - checkout
      # Gives this job a real Docker daemon to build/save images with,
      # since the primary executor here is just a thin CLI container.
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build custom application image
          command: |
            docker build -t widget-service:${CIRCLE_SHA1} .
            # Save the image to a tarball so it can be handed to the next
            # job via the workspace — avoids a registry round-trip and
            # guarantees the exact image that gets tested is what gets
            # published.
            docker save widget-service:${CIRCLE_SHA1} -o /tmp/widget-service.tar
      - persist_to_workspace:
          root: /tmp
          paths:
            - widget-service.tar

  test:
    # machine (not docker) executor: this job needs to run the custom image
    # as a peer container alongside the Postgres sidecar on a shared Docker
    # network, which needs a real host Docker daemon rather than
    # setup_remote_docker's isolated remote one.
    machine: true
    steps:
      - checkout
      - attach_workspace:
          at: /tmp
      - run:
          name: Load custom image built in previous job
          command: docker load -i /tmp/widget-service.tar
      - run:
          name: Start postgres sidecar and app container on a shared network
          command: |
            docker network create widget-net
            # Off-the-shelf Postgres image acting as the sidecar/secondary
            # container — the app talks to it over the network by name.
            docker run -d --name widget-postgres --network widget-net \
              -e POSTGRES_DB=circleci_demo -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres \
              postgres:16-alpine
      - run:
          name: Run pytest suite inside the custom image against the postgres sidecar
          command: |
            mkdir -p test-results
            chmod +x scripts/*.sh
            # Run the tests inside the same image that was built above (not
            # a separate test environment), so a pass here is a guarantee
            # about the artifact that will eventually be published.
            # wait-for-postgres.sh (the image's ENTRYPOINT) blocks until the
            # sidecar accepts connections before exec'ing the command below.
            docker run --network widget-net \
              -e DB_HOST=widget-postgres -e DB_PORT=5432 \
              -e DB_NAME=circleci_demo -e DB_USER=postgres -e DB_PASSWORD=postgres \
              -v "$(pwd)/test-results:/srv/app/test-results" \
              widget-service:${CIRCLE_SHA1} \
              bash -c "pip install --quiet pytest pytest-cov && pytest --junitxml=test-results/junit.xml --cov=. test_app.py"
      # Surfaces results in CircleCI's Tests tab (timing, history, flaky
      # detection) instead of leaving them buried in console output.
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results

  publish:
    docker:
      - image: cimg/aws:2024.03
    steps:
      - checkout
      # Exchanges this job's CircleCI OIDC ID token for temporary AWS
      # credentials by assuming AWS_OIDC_ROLE_ARN. Both env vars come from
      # the aws-oidc-publish context below, never from this job definition.
      - aws-cli/setup:
          role_arn: $AWS_OIDC_ROLE_ARN
          region: $AWS_REGION
      - run:
          name: Build and publish release artifact via OIDC-assumed role (no static keys)
          command: |
            chmod +x scripts/publish_artifact.sh
            ./scripts/publish_artifact.sh

workflows:
  version: 2

  # Always runs first. Decides whether the real work is worth doing at all
  # by diffing against main, then triggers a "continuation" pipeline with
  # run-build set accordingly.
  setup-and-route:
    when:
      not: << pipeline.parameters.run-build >>
    jobs:
      - path-filtering/filter:
          base-revision: main
          config-path: .circleci/config.yml
          # Any change under these paths flips run-build to true; anything
          # else (docs, this README, etc.) ends the pipeline here for free.
          mapping: |
            app/.* run-build true
            scripts/.* run-build true
            Dockerfile run-build true
            .circleci/.* run-build true

  # Only runs on the continuation pipeline triggered above, once run-build
  # is true.
  build-test-publish:
    when: << pipeline.parameters.run-build >>
    jobs:
      - build-image
      - test:
          requires:
            - build-image
      - publish:
          requires:
            - test
          # Publish is the only job gated to the default branch — PRs build
          # and test but never ship an artifact.
          filters:
            branches:
              only: main
          # Scopes the AWS OIDC role ARN/region to this job only; build-image
          # and test never have access to it.
          context:
            - aws-oidc-publish
