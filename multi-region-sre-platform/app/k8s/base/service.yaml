# Provisions a per-region internet-facing NLB via the AWS Load Balancer
# Controller. Its DNS name/zone ID is what gets fed into alb_endpoints in
# terraform/envs/global once both regions are deployed.
apiVersion: v1
kind: Service
metadata:
  name: sre-demo-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: sre-demo-app
  ports:
    - port: 443
      targetPort: 8080
      protocol: TCP
