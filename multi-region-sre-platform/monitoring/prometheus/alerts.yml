groups:
  - name: slo-burn-rate
    rules:
      - alert: RegionDown
        expr: probe_success{job="blackbox-region-healthz"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.region }} healthz probe failing"
          description: "Region {{ $labels.region }} has failed health checks for 1m. Route53 should fail traffic away within ~30-40s; confirm DNS has rerouted and follow docs/disaster-recovery.md if not."

      - alert: SLOFastBurn
        # 14.4x burn rate over 1h consumes the monthly error budget in ~2 days.
        expr: |
          (1 - avg_over_time(probe_success{job="blackbox-region-healthz"}[1h])) > (14.4 * 0.001)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Fast error-budget burn for {{ $labels.region }}"
          description: "1h error rate exceeds 14.4x the 99.9% SLO burn rate. Page on-call; see docs/incident-response.md."

      - alert: SLOSlowBurn
        # 6x burn rate over 6h consumes the monthly error budget in ~5 days.
        expr: |
          (1 - avg_over_time(probe_success{job="blackbox-region-healthz"}[6h])) > (6 * 0.001)
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Slow error-budget burn for {{ $labels.region }}"
          description: "6h error rate exceeds 6x the 99.9% SLO burn rate. Investigate during business hours."

      - alert: LatencySLOBreach
        expr: probe_duration_seconds{job="blackbox-region-healthz"} > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.region }} p99 latency above 300ms target"
          description: "Healthz probe latency for {{ $labels.region }} has exceeded the 300ms SLO target for 5m."
