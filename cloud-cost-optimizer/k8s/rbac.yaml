apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloud-cost-optimizer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloud-cost-optimizer-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloud-cost-optimizer-reader-binding
subjects:
  - kind: ServiceAccount
    name: cloud-cost-optimizer
    namespace: default
roleRef:
  kind: ClusterRole
  name: cloud-cost-optimizer-reader
  apiGroup: rbac.authorization.k8s.io
