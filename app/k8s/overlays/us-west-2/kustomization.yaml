apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base
patches:
  # Mirrors the us-east-1 overlay's region patch for this region.
  - target:
      kind: Deployment
      name: sre-demo-app
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: us-west-2
